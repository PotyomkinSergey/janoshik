framework:
    cache:
        app: cache.adapter.redis
        default_redis_provider: "%env(REDIS_URL)%"
    messenger:
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: janoshik
                        type: direct
                    queues:
                        messages: ~

        routing:
            App\Message\ProductCreatedMessage: async
            App\Message\ProductDeletedMessage: async
            App\Message\OrderCreatedMessage: async
